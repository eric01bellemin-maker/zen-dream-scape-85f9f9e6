<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonora Zen - Ambiances</title>
    <style>
        audio {
            filter: sepia(20%) hue-rotate(190deg) saturate(300%) brightness(100%);
            height: 30px;
            border-radius: 20px;
            width: 100%;
        }
        .sound-card {
            width: 250px; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            overflow: hidden;
            transition: 0.3s;
            margin: 10px;
        }
        .sound-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body style="margin:0; background-color: #f9f9f9; font-family: sans-serif;">

<section id="ambiances" style="padding: 60px 20px;">
    <div style="max-width: 1100px; margin: 0 auto; text-align: center;">
        <p style="color: #26A69A; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px;">UNIVERS SONORE</p>
        <h2 style="font-size: 32px; color: #333; margin-bottom: 40px;">4 ambiances pour <span style="color: #26A69A;">s'évader</span></h2>

        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">

            <div class="sound-card">
                <img src="https://raw.githubusercontent.com/eric01bellemin-maker/zen-dream-scape-85f9f9e6/main/public/oiseaux.jpg" style="width: 100%; height: 160px; object-fit: cover;">
                <div style="padding: 15px; text-align: left;">
                    <strong style="display: block; margin-bottom: 5px;">Chant d'oiseaux</strong>
                    <p style="font-size: 13px; color: #777; margin-bottom: 15px;">Mélodies douces au lever du jour</p>
                    <audio controls><source src="https://raw.githubusercontent.com/eric01bellemin-maker/zen-dream-scape-85f9f9e6/main/public/birds.mp3" type="audio/mpeg"></audio>
                </div>
            </div>

            <div class="sound-card">
                <img src="https://raw.githubusercontent.com/eric01bellemin-maker/zen-dream-scape-85f9f9e6/main/public/riviere.jpg" style="width: 100%; height: 160px; object-fit: cover;">
                <div style="padding: 15px; text-align: left;">
                    <strong style="display: block; margin-bottom: 5px;">Rivière apaisante</strong>
                    <p style="font-size: 13px; color: #777; margin-bottom: 15px;">Le murmure continu de l'eau vive</p>
                    <audio controls><source src="https://raw.githubusercontent.com/eric01bellemin-maker/zen-dream-scape-85f9f9e6/main/public/river.mp3" type="audio/mpeg"></audio>
                </div>
            </div>

            <div class="sound-card">
                <img src="https://raw.githubusercontent.com/eric01bellemin-maker/zen-dream-scape-85f9f9e6/main/public/vagues.jpg" style="width: 100%; height: 160px; object-fit: cover;">
                <div style="padding: 15px; text-align: left;">
                    <strong style="display: block; margin-bottom: 5px;">Douceur des vagues</strong>
                    <p style="font-size: 13px; color: #777; margin-bottom: 15px;">Le ressac hypnotique de l'océan</p>
                    <audio controls><source src="https://raw.githubusercontent.com/eric01bellemin-maker/zen-dream-scape-85f9f9e6/main/public/waves.mp3" type="audio/mpeg"></audio>
                </div>
            </div>

            <div class="sound-card">
                <img src="https://raw.githubusercontent.com/eric01bellemin-maker/zen-dream-scape-85f9f9e6/main/public/vent.jpg" style="width: 100%; height: 160px; object-fit: cover;">
                <div style="padding: 15px; text-align: left;">
                    <strong style="display: block; margin-bottom: 5px;">Souffle du vent</strong>
                    <p style="font-size: 13px; color: #777; margin-bottom: 15px;">La brise légère dans les arbres</p>
                    <audio controls><source src="https://raw.githubusercontent.com/eric01bellemin-maker/zen-dream-scape-85f9f9e6/main/public/wind.mp3" type="audio/mpeg"></audio>
                </div>
            </div>

        </div>
    </div>
</section>

</body>
</html>
